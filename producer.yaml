apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: <your-dockerhub>/producer:latest #image push to ECR and call the url
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: producer
spec:
  type: LoadBalancer
  selector:
    app: producer
  ports:
    - port: 3000
      targetPort: 3000
